<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <title>Paper Squadron</title>
  <style>
    :root {
      --paper: #e8dcc6;
      --ink: #2a241c;
      --felt: #1a1e28;
      --warn: #e8a060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background:
        radial-gradient(ellipse at 30% 20%, #2a3140 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, #252018 0%, transparent 45%),
        var(--felt);
      color: var(--paper);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.5rem;
    }

    h1 {
      font-weight: 400;
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: 0.04em;
      color: var(--paper);
    }

    h1 span {
      display: block;
      font-size: 0.55em;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.55;
      margin-top: 0.35em;
    }

    #game-container {
      box-shadow:
        0 0 0 1px rgba(200, 180, 150, 0.15),
        0 24px 48px rgba(0, 0, 0, 0.45);
      line-height: 0;
      max-width: min(100%, 960px);
      position: relative;
    }

    #game-container canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    #boot-error {
      display: none;
      max-width: 36rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid rgba(232, 160, 96, 0.45);
      background: rgba(40, 28, 18, 0.92);
      color: var(--paper);
      line-height: 1.55;
    }

    #boot-error strong {
      color: var(--warn);
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 400;
      font-size: 1.1rem;
    }

    #boot-error code {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.9em;
      color: var(--warn);
    }
  </style>
  <!-- Local Phaser build (no CDN required) -->
  <script src="js/vendor/phaser.min.js"></script>
</head>
<body>
  <h1>
    Paper Squadron
    <span>Hand-cut paper · press Enter to start</span>
  </h1>
  <div id="boot-error" role="alert"></div>
  <div id="game-container"></div>

  <!-- Config first, then modules, scenes, entry. ?v= busts stale JS after pulls. -->
  <script src="js/config.js?v=21"></script>
  <script src="js/resolveAsset.js?v=21"></script>
  <script src="js/PaperTextures.js?v=21"></script>
  <script src="js/EmbeddedAssets.js?v=21"></script>
  <script src="js/Boss.js?v=21"></script>
  <script src="js/BossArms.js?v=21"></script>
  <script src="js/Laser.js?v=21"></script>
  <script src="js/Projectile.js?v=21"></script>
  <script src="js/Sparks.js?v=21"></script>
  <script src="js/BossBullets.js?v=21"></script>
  <script src="js/Shield.js?v=21"></script>
  <script src="js/PowerPellets.js?v=21"></script>
  <script src="js/Minions.js?v=21"></script>
  <script src="js/Player.js?v=21"></script>
  <script src="js/ParallaxBackground.js?v=21"></script>
  <script src="scenes/BootScene.js?v=21"></script>
  <script src="scenes/PreloadScene.js?v=21"></script>
  <script src="scenes/TitleScene.js?v=21"></script>
  <script src="scenes/GameScene.js?v=21"></script>
  <script src="js/main.js?v=21"></script>
</body>
</html>
