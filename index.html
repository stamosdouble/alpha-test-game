<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <title>Paper Squadron</title>
  <style>
    :root {
      --paper: #e8dcc6;
      --ink: #2a241c;
      --felt: #1a1e28;
      --warn: #e8a060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--felt);
      color: var(--paper);
      font-family: Georgia, "Times New Roman", serif;
    }

    /* Game fills the entire browser window. */
    #game-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: none;
      background: #0e1118;
      line-height: 0;
    }

    #game-container canvas {
      display: block;
      margin: 0 auto;
    }

    #boot-error {
      display: none;
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      max-width: min(92vw, 36rem);
      padding: 0.85rem 1.1rem;
      border: 1px solid rgba(232, 160, 96, 0.45);
      background: rgba(40, 28, 18, 0.92);
      color: var(--paper);
      line-height: 1.45;
      font-size: 0.9rem;
      pointer-events: none;
    }

    #boot-error strong {
      color: var(--warn);
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 400;
      font-size: 1rem;
    }

    #boot-error code {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.9em;
      color: var(--warn);
    }

    #fs-hint {
      position: fixed;
      right: 12px;
      bottom: 10px;
      z-index: 15;
      font: 12px/1.3 Georgia, "Times New Roman", serif;
      color: rgba(232, 220, 198, 0.55);
      pointer-events: none;
    }
  </style>
  <!-- Local Phaser build (no CDN required) -->
  <script src="js/vendor/phaser.min.js"></script>
</head>
<body>
  <div id="boot-error" role="alert"></div>
  <div id="game-container"></div>
  <div id="fs-hint">F · fullscreen</div>

  <!-- Config first, then modules, scenes, entry. ?v= busts stale JS after pulls. -->
  <script src="js/config.js?v=27"></script>
  <script src="js/resolveAsset.js?v=27"></script>
  <script src="js/DropShadow.js?v=27"></script>
  <script src="js/PaperTextures.js?v=27"></script>
  <script src="js/EmbeddedAssets.js?v=27"></script>
  <script src="js/Boss.js?v=27"></script>
  <script src="js/BossArms.js?v=27"></script>
  <script src="js/Laser.js?v=27"></script>
  <script src="js/Projectile.js?v=27"></script>
  <script src="js/Sparks.js?v=27"></script>
  <script src="js/BossBullets.js?v=27"></script>
  <script src="js/Shield.js?v=27"></script>
  <script src="js/PowerPellets.js?v=27"></script>
  <script src="js/Minions.js?v=27"></script>
  <script src="js/Player.js?v=27"></script>
  <script src="js/ParallaxBackground.js?v=27"></script>
  <script src="scenes/BootScene.js?v=27"></script>
  <script src="scenes/PreloadScene.js?v=27"></script>
  <script src="scenes/TitleScene.js?v=27"></script>
  <script src="scenes/GameScene.js?v=27"></script>
  <script src="js/main.js?v=27"></script>
</body>
</html>
